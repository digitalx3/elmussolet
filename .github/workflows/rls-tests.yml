name: RLS Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls:
    name: Run RLS integration suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Required so GitHub mints an OIDC token we can exchange for credentials.
    permissions:
      contents: read
      id-token: write

    env:
      VITE_SUPABASE_URL: https://dembqxfdzvwilckastuj.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlbWJxeGZkenZ3aWxja2FzdHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjI0NTAsImV4cCI6MjA4ODQzODQ1MH0.i76b5h-J-a-1GKhDgjBdlJeKpt-6YUwmD9xOLDra6wM
      BOOTSTRAP_URL: https://dembqxfdzvwilckastuj.supabase.co/functions/v1/rls-ci-bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch admin credentials via GitHub OIDC
        id: bootstrap
        run: |
          set +x
          set -euo pipefail
          # Never echo the OIDC token or the bootstrap response in clear:
          # mask any non-empty value we extract from them before any other step
          # has a chance to print it.
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=lovable-rls-ci" \
            | jq -r .value)
          if [ -n "$OIDC_TOKEN" ] && [ "$OIDC_TOKEN" != "null" ]; then
            echo "::add-mask::$OIDC_TOKEN"
          else
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi
          RESPONSE=$(curl -sSL -X POST "$BOOTSTRAP_URL" \
            -H "Content-Type: application/json" \
            -H "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY" \
            -d "{\"token\":\"$OIDC_TOKEN\"}")
          # The response body may contain the email+password, so mask the raw
          # payload before we ever risk echoing it (e.g. in error branches).
          echo "::add-mask::$RESPONSE"
          EMAIL=$(echo "$RESPONSE" | jq -r '.email // empty')
          PASSWORD=$(echo "$RESPONSE" | jq -r '.password // empty')
          if [ -n "$EMAIL" ]; then echo "::add-mask::$EMAIL"; fi
          if [ -n "$PASSWORD" ]; then echo "::add-mask::$PASSWORD"; fi
          if [ -z "$EMAIL" ] || [ -z "$PASSWORD" ]; then
            ERR=$(echo "$RESPONSE" | jq -r '.error // "unknown error"')
            echo "::error::Bootstrap failed: $ERR"
            exit 1
          fi
          echo "TEST_ADMIN_EMAIL=$EMAIL" >> "$GITHUB_ENV"
          echo "TEST_ADMIN_PASSWORD=$PASSWORD" >> "$GITHUB_ENV"
          echo "Credentials fetched OK (values masked)."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS suite
        run: bun run test:rls
