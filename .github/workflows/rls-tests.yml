name: RLS Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls:
    name: Run RLS integration suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Required so GitHub mints an OIDC token we can exchange for credentials.
    permissions:
      contents: read
      id-token: write

    env:
      VITE_SUPABASE_URL: https://dembqxfdzvwilckastuj.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlbWJxeGZkenZ3aWxja2FzdHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjI0NTAsImV4cCI6MjA4ODQzODQ1MH0.i76b5h-J-a-1GKhDgjBdlJeKpt-6YUwmD9xOLDra6wM
      BOOTSTRAP_URL: https://dembqxfdzvwilckastuj.supabase.co/functions/v1/rls-ci-bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch admin credentials via GitHub OIDC
        id: bootstrap
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=lovable-rls-ci" \
            | jq -r .value)
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi
          RESPONSE=$(curl -sSL -X POST "$BOOTSTRAP_URL" \
            -H "Content-Type: application/json" \
            -H "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY" \
            -d "{\"token\":\"$OIDC_TOKEN\"}")
          EMAIL=$(echo "$RESPONSE" | jq -r .email)
          PASSWORD=$(echo "$RESPONSE" | jq -r .password)
          if [ -z "$EMAIL" ] || [ "$EMAIL" = "null" ]; then
            echo "::error::Bootstrap failed: $RESPONSE"
            exit 1
          fi
          # Mask before exporting so logs never reveal them.
          echo "::add-mask::$EMAIL"
          echo "::add-mask::$PASSWORD"
          echo "TEST_ADMIN_EMAIL=$EMAIL" >> "$GITHUB_ENV"
          echo "TEST_ADMIN_PASSWORD=$PASSWORD" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS suite
        run: bun run test:rls
