name: RLS Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls:
    name: Run RLS integration suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Public Lovable Cloud credentials (already exposed in .env). Override via repo
      # secrets if you point CI at a different backend.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dembqxfdzvwilckastuj.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlbWJxeGZkenZ3aWxja2FzdHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjI0NTAsImV4cCI6MjA4ODQzODQ1MH0.i76b5h-J-a-1GKhDgjBdlJeKpt-6YUwmD9xOLDra6wM' }}
      # REQUIRED repo secrets: an admin (or super_admin) account used to bootstrap fixtures.
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify required secrets
        run: |
          if [ -z "$TEST_ADMIN_EMAIL" ] || [ -z "$TEST_ADMIN_PASSWORD" ]; then
            echo "::error::Missing TEST_ADMIN_EMAIL / TEST_ADMIN_PASSWORD repo secrets."
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS suite
        run: bun run test:rls
